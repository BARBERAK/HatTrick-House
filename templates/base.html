{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HatTrick House{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'apuestas/style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="{% url 'apuestas:home' %}" class="logo">HatTrick House</a>
        </div>
        <div class="nav-center">
            <a href="{% url 'apuestas:games_list' %}" class="nav-sports">Mis Apuestas</a>
        </div>
        <div class="nav-right">
            {% if user.is_authenticated%}
                <span class="nav-saldo">Saldo {{user.userprofile.money}} €</span>
                <a href="{% url 'apuestas:ingresar' %}" class="nav-deposit">Ingresar</a>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-logout">Cerrar Sessión</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-login">Login</a>
            {% endif %}
        </div>
    </nav>



    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        {% comment %} <p>Django Blog - 2026</p> {% endcomment %}
    </footer>
</body>
</html>
