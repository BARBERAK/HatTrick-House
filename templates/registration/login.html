{% extends 'base.html' %} {% block title %}Iniciar Sesión - HatTrick House{% endblock %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 50px auto; padding: 30px; background-color: #f9f9f9; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    
    <h2 style="text-align: center; margin-bottom: 20px; color: #222;">Iniciar Sesión</h2>

    <form method="post">
        {% csrf_token %} {{ form.as_p }}
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #007BFF; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px;">
            Entrar
        </button>
    </form>
    
</div>
{% endblock %}
